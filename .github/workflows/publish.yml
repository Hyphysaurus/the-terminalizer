name: Publish to npm

# Auto-publishes to npm whenever the version in package.json changes on main.
# Bump the version, push, and the new release goes out — npm never drifts behind GitHub again.

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # enables npm publish provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm test
      - name: Publish if version is new
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already on npm — nothing to publish."
          else
            echo "Publishing $NAME@$VERSION to npm..."
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
